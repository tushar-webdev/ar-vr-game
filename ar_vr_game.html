<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Ball Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        .menu {
            text-align: center;
            padding: 40px;
        }

        .menu h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #06b6d4;
        }

        .menu p {
            margin-bottom: 30px;
            color: #cbd5e1;
        }

        button {
            display: block;
            width: 300px;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.1rem;
            background: #06b6d4;
            color: #0f172a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ff;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .debug-box {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border: 1px solid #0f0;
            font-size: 12px;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
        }

        #gameScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: #06b6d4;
            font-weight: bold;
            z-index: 100;
        }

        .score {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            width: fit-content;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            width: 120px !important;
            margin: 0 !important;
        }

        .power-bar-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #06b6d4;
            border-radius: 3px;
            z-index: 100;
        }

        .power-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #06b6d4, #ef4444);
            width: 0%;
            transition: width 0.05s;
        }

        .error {
            background: #ef4444;
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu" id="menu">
            <h1>🎮 AR BALL GAME</h1>
            <p>3D Physics-based Ball Games</p>
            <button onclick="startThrowGame()">🎯 THROW INTO NET</button>
            <button onclick="startBatGame()">⚾ BAT GAME</button>
            <p style="margin-top: 30px; font-size: 0.9rem;">Three.js loaded: <span id="threeStatus">Checking...</span></p>
        </div>

        <div id="gameScreen">
            <div class="game-ui">
                <div class="score">
                    <div>SCORE: <span id="score">0</span></div>
                    <div>HITS: <span id="hits">0</span></div>
                </div>
            </div>

            <div class="power-bar-container">
                <div class="power-bar" id="powerBar"></div>
            </div>

            <div class="controls">
                <button class="control-btn" 
                        onmousedown="startCharge()" 
                        onmouseup="throwBall()"
                        ontouchstart="startCharge()" 
                        ontouchend="throwBall()">
                    THROW
                </button>
                <button class="control-btn" onclick="resetGame()">RESET</button>
                <button class="control-btn" onclick="goToMenu()">MENU</button>
            </div>
        </div>
    </div>

    <div class="debug-box" id="debugBox"></div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let debugMessages = [];
        
        function debug(msg) {
            console.log(msg);
            debugMessages.unshift('[' + new Date().toLocaleTimeString() + '] ' + msg);
            if (debugMessages.length > 10) debugMessages.pop();
            document.getElementById('debugBox').innerHTML = debugMessages.join('<br>');
        }

        debug('Script starting...');

        // Check Three.js
        window.addEventListener('load', function() {
            debug('Window loaded');
            if (typeof THREE !== 'undefined') {
                debug('✅ THREE.js loaded successfully');
                document.getElementById('threeStatus').textContent = '✅ READY';
                document.getElementById('threeStatus').style.color = '#10b981';
            } else {
                debug('❌ THREE.js NOT FOUND');
                document.getElementById('threeStatus').textContent = '❌ FAILED';
                document.getElementById('threeStatus').style.color = '#ef4444';
            }
        });

        // Game state
        let gameActive = false;
        let gameMode = null;
        let score = 0;
        let hits = 0;
        let charging = false;
        let chargeLevel = 0;

        let scene, camera, renderer;
        let ball, goalObject;
        let chargeInterval;

        function debug(msg) {
            console.log(msg);
            debugMessages.unshift('[' + new Date().toLocaleTimeString() + '] ' + msg);
            if (debugMessages.length > 10) debugMessages.pop();
            document.getElementById('debugBox').innerHTML = debugMessages.join('<br>');
        }

        function startThrowGame() {
            debug('Starting throw game...');
            try {
                gameMode = 'throw';
                startGame();
            } catch(e) {
                debug('ERROR: ' + e.message);
            }
        }

        function startBatGame() {
            debug('Starting bat game...');
            try {
                gameMode = 'bat';
                startGame();
            } catch(e) {
                debug('ERROR: ' + e.message);
            }
        }

        function startGame() {
            debug('startGame() called, mode: ' + gameMode);

            if (typeof THREE === 'undefined') {
                debug('ERROR: Three.js not available');
                return;
            }

            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            gameActive = true;
            score = 0;
            hits = 0;
            charging = false;
            chargeLevel = 0;

            document.getElementById('score').textContent = '0';
            document.getElementById('hits').textContent = '0';

            initScene();
            animate();
            
            debug('Game initialized');
        }

        function initScene() {
            debug('Initializing 3D scene...');

            const gameContainer = document.getElementById('gameScreen');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            // Camera
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 2, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(window.devicePixelRatio);

            // Clear previous canvas if exists
            const existingCanvas = gameContainer.querySelector('canvas');
            if (existingCanvas) {
                existingCanvas.remove();
            }

            gameContainer.appendChild(renderer.domElement);
            debug('Renderer created: ' + width + 'x' + height);

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // Floor
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0f172a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Grid
            const grid = new THREE.GridHelper(100, 10, 0x06b6d4, 0x1e293b);
            scene.add(grid);

            // Ball
            const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xef4444 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(-10, 2, 0);
            ball.velocity = new THREE.Vector3(0, 0, 0);
            scene.add(ball);
            debug('Ball created');

            if (gameMode === 'throw') {
                // Create goal
                const goalGeo = new THREE.BoxGeometry(3, 3, 0.5);
                const goalMat = new THREE.MeshStandardMaterial({ color: 0x06b6d4, wireframe: true });
                goalObject = new THREE.Mesh(goalGeo, goalMat);
                goalObject.position.set(10, 2, 0);
                scene.add(goalObject);
                debug('Goal created');
            } else if (gameMode === 'bat') {
                // Create target
                const targetGeo = new THREE.SphereGeometry(1, 32, 32);
                const targetMat = new THREE.MeshStandardMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.3 });
                goalObject = new THREE.Mesh(targetGeo, targetMat);
                goalObject.position.set(0, 10, 50);
                scene.add(goalObject);
                debug('Target created');
            }

            window.addEventListener('resize', onWindowResize);
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Update charge
            if (charging) {
                chargeLevel = Math.min(100, chargeLevel + 2);
                document.getElementById('powerBar').style.width = chargeLevel + '%';
            }

            // Physics
            if (ball) {
                ball.velocity.y -= 0.3; // Gravity
                ball.position.add(ball.velocity);

                // Floor bounce
                if (ball.position.y < 0.3) {
                    ball.position.y = 0.3;
                    ball.velocity.y *= -0.6;
                    ball.velocity.x *= 0.95;
                    ball.velocity.z *= 0.95;
                }

                // Goal check
                if (goalObject && ball.position.distanceTo(goalObject.position) < 2) {
                    score += 10;
                    hits++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('hits').textContent = hits;
                    debug('GOAL! Score: ' + score);
                    resetGame();
                }

                // Reset if too far
                if (ball.position.length() > 200) {
                    resetGame();
                }
            }

            renderer.render(scene, camera);
        }

        function startCharge() {
            if (!gameActive) return;
            charging = true;
            chargeLevel = 0;
            debug('Charging...');
        }

        function throwBall() {
            if (!gameActive || !charging) return;
            charging = false;

            const power = chargeLevel / 100;
            const strength = 25 * power;

            debug('Throw! Power: ' + Math.round(chargeLevel) + '%');

            if (gameMode === 'throw') {
                ball.velocity.set(
                    (Math.random() - 0.5) * 5,
                    15 * power,
                    strength
                );
            } else if (gameMode === 'bat') {
                ball.velocity.set(
                    (Math.random() - 0.5) * 10,
                    Math.random() * 15 + 5,
                    -strength * 1.2
                );
            }

            document.getElementById('powerBar').style.width = '0%';
            chargeLevel = 0;
        }

        function resetGame() {
            if (gameMode === 'throw') {
                ball.position.set(-10, 2, 0);
            } else {
                ball.position.set(0, 3, 30);
            }
            ball.velocity.set(0, 0, 0);
        }

        function goToMenu() {
            debug('Returning to menu...');
            gameActive = false;

            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('menu').style.display = 'block';

            if (renderer) {
                renderer.dispose();
                const canvas = document.querySelector('canvas');
                if (canvas) canvas.remove();
                renderer = null;
            }
            
            scene = null;
            camera = null;
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        debug('Script loaded successfully');
    </script>
</body>
</html>
